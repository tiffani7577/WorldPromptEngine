<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Prompt Engine</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #16162a;
      --line: #2e2e4a;
      --text: #ffffff;
      --muted: #a8a8c0;
      --accent: #7b68ee;
      --accent-dim: #5a4fcf;
      --ok: #3ddc97;
      --warn: #f0c14a;
      --bad: #ff6b7a;
      --step: #12122a;
      --grey: #5a5a72;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font: 16px/1.45 "Avenir Next", "Segoe UI", system-ui, sans-serif;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 22px 20px 48px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .sub { color: var(--muted); margin: 0 0 18px; font-size: 14px; }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 22px 0;
      opacity: 0.55;
    }
    .step {
      background: var(--step);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px 16px 16px;
      margin-bottom: 4px;
    }
    .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 10px;
    }
    .step h2 {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 700;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin: 10px 0 6px;
    }
    textarea, input[type="text"], select {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0f0f1c;
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }
    textarea { min-height: 88px; resize: vertical; }
    textarea:focus, input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(123,104,238,0.25);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
    }
    button {
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      border-radius: 14px;
      padding: 14px 18px;
      transition: transform .08s ease, filter .15s ease, opacity .15s ease, background .2s ease;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .btn-primary {
      width: 100%;
      margin-top: 14px;
      background: linear-gradient(180deg, #8f7cff, var(--accent-dim));
      color: #fff;
      font-size: 17px;
      letter-spacing: 0.02em;
      box-shadow: 0 0 24px rgba(123,104,238,0.45);
    }
    .btn-secondary {
      background: #242444;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 10px 12px;
      font-size: 13px;
      border-radius: 10px;
    }
    .btn-add {
      background: linear-gradient(180deg, #8f7cff, var(--accent-dim));
      color: #fff;
      padding: 10px 14px;
      font-size: 13px;
      white-space: nowrap;
      box-shadow: 0 0 12px rgba(123,104,238,0.35);
    }
    .progress-wrap {
      margin-top: 12px;
      background: #0c0c18;
      border-radius: 999px;
      overflow: hidden;
      height: 12px;
      border: 1px solid var(--line);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #a794ff);
      transition: width .25s ease;
    }
    .status-line {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      min-height: 1.3em;
    }
    .msg {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #101020;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      white-space: pre-wrap;
    }
    .msg.ok { border-color: rgba(61,220,151,0.45); color: #c9ffe6; }
    .msg.bad { border-color: rgba(255,107,122,0.5); color: #ffd0d5; }
    .list {
      margin-top: 10px;
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0c0c18;
    }
    .list.tall { max-height: 280px; }
    .list-item {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    .list-item:last-child { border-bottom: 0; }
    .list-item .meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .list-item .title { font-weight: 700; font-size: 16px; }
    .list-item .date { color: var(--grey); font-size: 11px; margin-top: 2px; }
    .empty-hint {
      padding: 16px 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
    .num-badge {
      flex: 0 0 auto;
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .setlist-save-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 12px;
      align-items: stretch;
    }
    .setlist-save-row select { min-width: 0; }
    .perf-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .perf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-perf {
      background: linear-gradient(180deg, #8f7cff, var(--accent-dim));
      color: #fff;
      font-size: 15px;
      min-height: 58px;
      box-shadow: 0 0 18px rgba(123,104,238,0.35);
    }
    .btn-perf.running {
      background: linear-gradient(180deg, #55e8a8, #1fad6e);
      box-shadow: 0 0 22px rgba(61,220,151,0.45);
    }
    .btn-next {
      width: 100%;
      min-height: 88px;
      font-size: 22px;
      letter-spacing: 0.04em;
      background: linear-gradient(180deg, #a794ff, #7b68ee 45%, #5a4fcf);
      box-shadow: 0 0 36px rgba(123,104,238,0.65);
      border: 2px solid rgba(255,255,255,0.18);
    }
    .btn-next .hint {
      display: block;
      font-size: 12px;
      font-weight: 600;
      opacity: 0.85;
      margin-top: 4px;
      letter-spacing: 0;
      text-transform: none;
    }
    .btn-stop {
      background: linear-gradient(180deg, #ff8a96, #d94555);
      box-shadow: 0 0 18px rgba(255,107,122,0.35);
    }
    .btn-stop.armed {
      background: linear-gradient(180deg, #ff6b7a, #b82d3d);
      box-shadow: 0 0 22px rgba(255,107,122,0.5);
    }
    .live-box {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: #0c0c18;
      border: 1px solid var(--line);
    }
    .dot-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 7px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .dot-row strong { color: var(--text); font-weight: 700; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--grey); flex: 0 0 auto;
    }
    .dot.green { background: var(--ok); box-shadow: 0 0 10px rgba(61,220,151,.5); }
    .dot.yellow { background: var(--warn); box-shadow: 0 0 10px rgba(240,193,74,.45); }
    .hbar-meters { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .hbar {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 10px;
      align-items: center;
    }
    .hbar .label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }
    .hbar-track {
      height: 10px;
      border-radius: 999px;
      background: #16162a;
      border: 1px solid var(--line);
      overflow: hidden;
    }
    .hbar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width .12s linear;
    }
    .hbar-fill.energy { background: linear-gradient(90deg, #7b68ee, #c4b5ff); }
    .hbar-fill.bass { background: linear-gradient(90deg, #3d7bff, #7eb6ff); }
    .hbar-fill.mids { background: linear-gradient(90deg, #3ddc97, #8ff0c4); }
    .hbar-fill.highs { background: linear-gradient(90deg, #f0c14a, #ffe08a); }
    .hbar-fill.kick { background: linear-gradient(90deg, #ff6b7a, #ffb0b8); }
    .hbar-fill.vocal { background: linear-gradient(90deg, #e07bff, #f0b8ff); }
    #footerError {
      position: sticky;
      bottom: 0;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(40, 12, 18, 0.96);
      border: 1px solid rgba(255,107,122,0.55);
      color: #ffd0d5;
      font-size: 14px;
      font-weight: 600;
    }
    #footerError[hidden] { display: none; }
  </style>
</head>
<body>
  <main>
    <h1>World Prompt Engine</h1>
    <p class="sub">Four steps. Describe a world. Save it. Build your show. Perform.</p>

    <section class="step" id="step1">
      <div class="step-num">1</div>
      <h2>Build Your World</h2>
      <label>Describe the world for this song</label>
      <textarea id="prompt" placeholder="e.g. dark ocean at blood moon with floating crystal islands and ancient ruins"></textarea>
      <div class="row">
        <div>
          <label>Map Size</label>
          <select id="mapSize"></select>
        </div>
        <div>
          <label>Mood</label>
          <select id="mood"></select>
        </div>
        <div>
          <label>Weather</label>
          <select id="weather"></select>
        </div>
      </div>
      <button class="btn-primary" id="btnGenerate">GENERATE WORLD</button>
      <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
      <div class="status-line" id="phase">Ready</div>
      <div class="msg" id="msg1" hidden></div>
    </section>

    <div class="divider"></div>

    <section class="step" id="step2">
      <div class="step-num">2</div>
      <h2>Save This World</h2>
      <label>Give this world a name (e.g. Song 1 - Ocean Intro)</label>
      <input id="worldName" type="text" placeholder="Song 1 - Ocean Intro" />
      <button class="btn-primary" id="btnSave">SAVE TO LIBRARY</button>
      <div class="msg" id="msg2" hidden></div>
      <div class="list" id="libraryList"></div>
    </section>

    <div class="divider"></div>

    <section class="step" id="step3">
      <div class="step-num">3</div>
      <h2>Build Your Setlist</h2>
      <label>Build Your Show — add worlds in order</label>
      <div class="list tall" id="libraryForSetlist"></div>
      <label style="margin-top:16px">Current setlist</label>
      <div class="list tall" id="setlistList"></div>
      <div class="setlist-save-row">
        <input id="setlistName" type="text" placeholder="Setlist name" />
        <button class="btn-secondary" id="btnSaveSetlist">SAVE SETLIST</button>
      </div>
      <label>Load a saved setlist</label>
      <select id="loadSetlist"></select>
      <div class="msg" id="msg3" hidden></div>
    </section>

    <div class="divider"></div>

    <section class="step" id="step4">
      <div class="step-num">4</div>
      <h2>Perform</h2>
      <p class="sub" style="margin-bottom:8px">You are ready to perform</p>
      <div class="perf-stack">
        <button class="btn-next" id="btnNext">NEXT WORLD<span class="hint" id="nextHint">Up next: —</span></button>
        <div class="perf-row">
          <button class="btn-perf" id="btnStart">START SHOW</button>
          <button class="btn-perf btn-stop" id="btnStop">STOP SHOW</button>
        </div>
        <button class="btn-perf" id="btnCamera">NEW CAMERA PATH</button>
      </div>
      <div class="live-box">
        <div class="dot-row"><span class="dot" id="oscDot"></span><span id="oscLabel">Waiting for Ableton...</span></div>
        <div class="dot-row"><span class="dot" id="camDot"></span><span id="camLabel">Camera off</span></div>
        <div class="dot-row"><span style="opacity:.7">Current world:</span>&nbsp;<strong id="worldLabel">—</strong></div>
        <div class="dot-row"><span style="opacity:.7">Next world:</span>&nbsp;<strong id="nextWorldLabel">—</strong></div>
        <div class="hbar-meters" id="meters"></div>
      </div>
      <div class="msg" id="msg4" hidden></div>
    </section>

    <div id="footerError" hidden>Could not connect — check your setup</div>
  </main>

  <script>
    const WS_URL = "ws://127.0.0.1:3001";
    const PARAMS = ["energy","bass","mids","highs","kick","vocal"];
    let socket = null;
    let reconnectTimer = null;
    let generating = false;
    let showRunning = false;
    let busy = {};
    let lastSavedSelect = "";

    const el = (id) => document.getElementById(id);

    function showMsg(id, text, ok) {
      const n = el(id);
      n.hidden = !text;
      n.textContent = text || "";
      n.className = "msg " + (ok ? "ok" : "bad");
      if (!ok && text) {
        const f = el("footerError");
        f.hidden = false;
        f.textContent = text;
      }
    }

    function clearFooter() {
      el("footerError").hidden = true;
    }

    function fillSelect(node, items, selected) {
      node.innerHTML = "";
      items.forEach((item) => {
        const o = document.createElement("option");
        o.value = item;
        o.textContent = item;
        if (item === selected) o.selected = true;
        node.appendChild(o);
      });
    }

    function send(payload) {
      return new Promise((resolve, reject) => {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          reject(new Error("Not connected"));
          return;
        }
        const request_id = "r_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
        const body = Object.assign({}, payload, { request_id });
        const onMsg = (ev) => {
          let data;
          try { data = JSON.parse(ev.data); }
          catch (e) { return; }
          if (!data || data.request_id !== request_id) return;
          socket.removeEventListener("message", onMsg);
          resolve(data);
        };
        socket.addEventListener("message", onMsg);
        socket.send(JSON.stringify(body));
        setTimeout(() => {
          socket.removeEventListener("message", onMsg);
          resolve({ ok: false, message: "Could not connect — check your setup", request_id });
        }, 15000);
      });
    }

    async function rpc(op, args) {
      try {
        const res = await send({ action: "panel_rpc", op, ...(args || {}) });
        if (res && res.result) return res.result;
        return res || { ok: false, message: "Could not connect — check your setup" };
      } catch (e) {
        return { ok: false, message: "Could not connect — check your setup" };
      }
    }

    async function withBusy(btn, restoreFn, fn) {
      if (!btn || busy[btn.id]) return;
      busy[btn.id] = true;
      const prevDisabled = btn.disabled;
      btn.disabled = true;
      const prevHTML = btn.innerHTML;
      btn.textContent = "...";
      try {
        return await fn();
      } finally {
        busy[btn.id] = false;
        btn.disabled = prevDisabled;
        if (typeof restoreFn === "function") restoreFn();
        else if (typeof restoreFn === "string") btn.textContent = restoreFn;
        else btn.innerHTML = prevHTML;
      }
    }

    function renderMeters(params) {
      const root = el("meters");
      if (!root.dataset.ready) {
        root.innerHTML = "";
        PARAMS.forEach((p) => {
          const d = document.createElement("div");
          d.className = "hbar";
          d.innerHTML =
            '<div class="label">' + p + '</div>' +
            '<div class="hbar-track"><div class="hbar-fill ' + p + '" id="m_' + p + '"></div></div>';
          root.appendChild(d);
        });
        root.dataset.ready = "1";
      }
      PARAMS.forEach((p) => {
        const v = Math.max(0, Math.min(1, Number((params || {})[p] || 0)));
        const fill = el("m_" + p);
        if (fill) fill.style.width = Math.round(v * 100) + "%";
      });
    }

    function renderStep2Library(worlds) {
      const a = el("libraryList");
      a.innerHTML = "";
      (worlds || []).forEach((w) => {
        const row = document.createElement("div");
        row.className = "list-item";
        row.innerHTML = '<div><div class="title"></div><div class="meta"></div></div>';
        row.querySelector(".title").textContent = w.world_name || "Untitled";
        row.querySelector(".meta").textContent = w.prompt_preview || "";
        a.appendChild(row);
      });
      if (!(worlds || []).length) {
        a.innerHTML = '<div class="empty-hint">No saved worlds yet.</div>';
      }
    }

    function renderLibraryCards(worlds) {
      const b = el("libraryForSetlist");
      b.innerHTML = "";
      if (!(worlds || []).length) {
        b.innerHTML = '<div class="empty-hint">No worlds saved yet — go to Step 1 to generate your first world</div>';
        return;
      }
      (worlds || []).forEach((w) => {
        const row = document.createElement("div");
        row.className = "list-item";
        const left = document.createElement("div");
        left.innerHTML = '<div class="title"></div><div class="meta"></div><div class="date"></div>';
        left.querySelector(".title").textContent = w.world_name || "Untitled";
        left.querySelector(".meta").textContent = w.prompt_preview || "";
        left.querySelector(".date").textContent = w.creation_date || "";
        const actions = document.createElement("div");
        actions.className = "actions";
        const add = document.createElement("button");
        add.className = "btn-add";
        add.textContent = "ADD TO SETLIST →";
        add.onclick = async () => {
          await withBusy(add, "ADD TO SETLIST →", async () => {
            const r = await rpc("setlist_add", { path: w.level_path, name: w.world_name });
            showMsg("msg3", r.message, r.ok);
            if (r.ok) {
              clearFooter();
              if (r.setlist) renderSetlist(r.setlist, null);
            }
            await refresh(true);
          });
        };
        actions.appendChild(add);
        row.appendChild(left);
        row.appendChild(actions);
        b.appendChild(row);
      });
    }

    function renderSetlist(setlist, saved) {
      const root = el("setlistList");
      root.innerHTML = "";
      if (!(setlist || []).length) {
        root.innerHTML = '<div class="empty-hint">Your setlist is empty — add worlds from your library above</div>';
      } else {
        (setlist || []).forEach((e, i) => {
          const row = document.createElement("div");
          row.className = "list-item";
          const left = document.createElement("div");
          left.style.display = "flex";
          left.style.alignItems = "center";
          left.style.gap = "10px";
          left.innerHTML = '<span class="num-badge"></span><div class="title"></div>';
          left.querySelector(".num-badge").textContent = String(i + 1);
          left.querySelector(".title").textContent = e.name || "World";
          const actions = document.createElement("div");
          actions.className = "actions";
          [["UP","up"],["DOWN","down"]].forEach(([label, dir]) => {
            const b = document.createElement("button");
            b.className = "btn-secondary";
            b.textContent = label;
            b.onclick = async () => {
              await withBusy(b, label, async () => {
                const r = await rpc("setlist_move", { index: i, direction: dir });
                showMsg("msg3", r.message, r.ok);
                if (r.ok) clearFooter();
                await refresh(true);
              });
            };
            actions.appendChild(b);
          });
          const rem = document.createElement("button");
          rem.className = "btn-secondary";
          rem.textContent = "REMOVE";
          rem.onclick = async () => {
            await withBusy(rem, "REMOVE", async () => {
              const r = await rpc("setlist_remove", { index: i });
              showMsg("msg3", r.message, r.ok);
              if (r.ok) clearFooter();
              await refresh(true);
            });
          };
          actions.appendChild(rem);
          row.appendChild(left);
          row.appendChild(actions);
          root.appendChild(row);
        });
      }

      if (saved !== null && saved !== undefined) {
        const sel = el("loadSetlist");
        const cur = lastSavedSelect || sel.value;
        sel.innerHTML = '<option value="">LOAD SETLIST</option>';
        (saved || []).forEach((n) => {
          const o = document.createElement("option");
          o.value = n; o.textContent = n;
          if (n === cur) o.selected = true;
          sel.appendChild(o);
        });
      }
    }

    function updatePerformUI(s) {
      showRunning = !!s.show_running;
      const start = el("btnStart");
      const stop = el("btnStop");
      if (!busy[start.id]) {
        start.textContent = showRunning ? "SHOW RUNNING" : "START SHOW";
        start.classList.toggle("running", showRunning);
      }
      if (!busy[stop.id]) {
        stop.classList.toggle("armed", !showRunning);
      }

      const cur = s.current_world || "—";
      const nxt = s.next_world || "—";
      el("worldLabel").textContent = cur;
      el("nextWorldLabel").textContent = nxt;
      el("nextHint").textContent = "Up next: " + nxt;

      el("oscLabel").textContent = s.osc_label || "Waiting for Ableton...";
      el("oscDot").className = "dot " + (s.ableton_live ? "green" : (s.osc_active ? "yellow" : ""));
      el("camLabel").textContent = s.camera_on ? "Camera running" : "Camera off";
      el("camDot").className = "dot " + (s.camera_on ? "green" : "");
      renderMeters(s.params || {});
    }

    async function refresh(forceLists) {
      const s = await rpc("status");
      if (!s || !s.ok) {
        if (s && s.message) {
          el("footerError").hidden = false;
          el("footerError").textContent = s.message;
        }
        return;
      }
      clearFooter();

      if (s.map_sizes) fillSelect(el("mapSize"), s.map_sizes, el("mapSize").value || "Medium");
      if (s.moods) fillSelect(el("mood"), s.moods, el("mood").value || "Ethereal & Beautiful");
      if (s.weathers) fillSelect(el("weather"), s.weathers, el("weather").value || "Blood Moon");

      generating = !!s.generating;
      const btn = el("btnGenerate");
      if (!busy[btn.id]) {
        btn.disabled = generating;
        btn.textContent = generating ? "GENERATING... please wait" : "GENERATE WORLD";
      }
      el("phase").textContent = s.phase || "Ready";
      el("progress").style.width = Math.max(0, Math.min(100, Number(s.progress_pct || 0))) + "%";

      renderStep2Library(s.worlds || []);
      renderLibraryCards(s.worlds || []);
      renderSetlist(s.setlist || [], s.saved_setlists || []);
      updatePerformUI(s);
    }

    function connect() {
      if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) return;
      try { socket = new WebSocket(WS_URL); } catch (e) { scheduleReconnect(); return; }
      socket.addEventListener("open", () => { refresh(); });
      socket.addEventListener("close", scheduleReconnect);
      socket.addEventListener("error", () => {});
    }
    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 1200);
    }

    el("btnGenerate").onclick = async () => {
      await withBusy(el("btnGenerate"), () => {
        el("btnGenerate").textContent = generating ? "GENERATING... please wait" : "GENERATE WORLD";
        el("btnGenerate").disabled = generating;
      }, async () => {
        const r = await rpc("generate", {
          prompt: el("prompt").value,
          map_size: el("mapSize").value,
          mood: el("mood").value,
          weather: el("weather").value,
        });
        showMsg("msg1", r.message, r.ok);
        if (r.ok) clearFooter();
        await refresh();
      });
    };
    el("btnSave").onclick = async () => {
      await withBusy(el("btnSave"), "SAVE TO LIBRARY", async () => {
        const r = await rpc("save_world", { world_name: el("worldName").value });
        showMsg("msg2", r.message, r.ok);
        if (r.ok) clearFooter();
        await refresh();
      });
    };
    el("btnSaveSetlist").onclick = async () => {
      await withBusy(el("btnSaveSetlist"), "SAVE SETLIST", async () => {
        const r = await rpc("setlist_save", { name: el("setlistName").value });
        showMsg("msg3", r.message, r.ok);
        if (r.ok) clearFooter();
        await refresh();
      });
    };
    el("loadSetlist").onchange = async () => {
      const name = el("loadSetlist").value;
      lastSavedSelect = name;
      if (!name) return;
      const r = await rpc("setlist_load", { name });
      showMsg("msg3", r.message, r.ok);
      if (r.ok) clearFooter();
      await refresh();
    };
    el("btnStart").onclick = async () => {
      await withBusy(el("btnStart"), () => {
        el("btnStart").textContent = showRunning ? "SHOW RUNNING" : "START SHOW";
        el("btnStart").classList.toggle("running", showRunning);
      }, async () => {
        const r = await rpc("start_show");
        showMsg("msg4", r.message, r.ok);
        if (r.ok) clearFooter();
        await refresh();
      });
    };
    el("btnNext").onclick = async () => {
      await withBusy(el("btnNext"), () => {
        el("btnNext").innerHTML = 'NEXT WORLD<span class="hint" id="nextHint">Up next: ' +
          (el("nextWorldLabel").textContent || "—") + "</span>";
      }, async () => {
        const r = await rpc("next_world");
        showMsg("msg4", r.message, r.ok);
        if (r.ok) clearFooter();
        await refresh();
      });
    };
    el("btnCamera").onclick = async () => {
      await withBusy(el("btnCamera"), "NEW CAMERA PATH", async () => {
        const r = await rpc("new_camera_path");
        showMsg("msg4", r.message, r.ok);
        if (r.ok) clearFooter();
        await refresh();
      });
    };
    el("btnStop").onclick = async () => {
      await withBusy(el("btnStop"), "STOP SHOW", async () => {
        const r = await rpc("stop_show");
        showMsg("msg4", r.message, r.ok);
        if (r.ok) clearFooter();
        await refresh();
      });
    };

    fillSelect(el("mapSize"), ["Small (faster)","Medium","Large (best quality)"], "Medium");
    fillSelect(el("mood"), ["Ethereal & Beautiful","Dark & Dramatic","Epic & Massive","Dreamy & Soft"], "Ethereal & Beautiful");
    fillSelect(el("weather"), ["Clear Noon","Golden Hour","Blood Moon","Dense Fog","Storm Front","Aurora Night","Deep Ocean Dark","Blizzard","Ember Night","Crystal Glow"], "Blood Moon");
    el("loadSetlist").innerHTML = '<option value="">LOAD SETLIST</option>';
    renderMeters({});
    renderLibraryCards([]);
    renderSetlist([], []);

    connect();
    setInterval(() => { if (socket && socket.readyState === WebSocket.OPEN) refresh(); }, 500);
  </script>
</body>
</html>
